name: e2e

on:
  push:
    branches: [main]
  pull_request:

jobs:
  e2e:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Run full system boot
        run: |
          chmod +x scripts/full-system-boot.sh
          ./scripts/full-system-boot.sh
