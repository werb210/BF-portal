name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  verify:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - run: npm ci

      - name: Guardrails
        run: |
          chmod +x scripts/ci-guard.sh
          ./scripts/ci-guard.sh

      - run: npm run typecheck
      - run: npm run build
      - run: npm run test:ci

      - name: Verify artifact
        run: test -f dist/index.html
