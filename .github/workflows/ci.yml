name: portal-ci

on:
  push:
    branches: [main]
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - run: npm ci

      - name: Block compiled JS in src
        run: python scripts/check_js_shadow.py

      - name: Check login redirect
        run: |
          grep -R 'navigate("/portal"' src/pages/LoginPage.tsx

      - name: Ensure no twilio-client imports
        run: |
          if rg -n "twilio-client" src app tests; then
            echo "LEGACY TWILIO IMPORT DETECTED"
            exit 1
          fi

      - name: Typecheck
        run: npm run typecheck

      - name: Build
        run: npm run build

      - name: Ensure dist exists
        run: test -f dist/index.html

      - name: YAML valid
        run: npx --yes yaml@2.8.1 valid .github/workflows/ci.yml
