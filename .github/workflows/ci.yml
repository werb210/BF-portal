name: BF Portal CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  build-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Use Node 20
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Typecheck (FAIL HARD)
        run: npx tsc --noEmit

      - name: Build (FAIL HARD)
        run: npm run build

      - name: Run tests (FAIL HARD)
        run: npm run test
