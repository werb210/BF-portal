name: CI

on:
  pull_request:
    branches: [main]

jobs:
  verify:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install (non-blocking)
        run: npm ci --ignore-scripts || true

      - name: Build
        run: npm run build

      - name: Verify dist output
        run: test -f dist/index.html
