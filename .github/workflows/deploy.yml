name: deploy

on:
  push:
    branches:
      - main

jobs:
  build_and_deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # ✅ CRITICAL: Create .env file for Vite (THIS is the fix)
      - name: Inject env for Vite
        run: |
          echo "VITE_API_URL=${{ secrets.VITE_API_BASE_URL }}" >> .env
          echo "VITE_API_BASE_URL=${{ secrets.VITE_API_BASE_URL }}" >> .env
          echo "VITE_APP_URL=${{ secrets.VITE_APP_URL }}" >> .env
          echo "VITE_CLIENT_APP_URL=${{ secrets.VITE_CLIENT_APP_URL }}" >> .env
          echo "VITE_JWT_STORAGE_KEY=auth_token" >> .env

      # 🔍 Debug (proves fix)
      - name: Debug env
        run: |
          cat .env

      # ❌ REMOVE ALL previous "verify env" steps — they are wrong

      - name: Build and Deploy
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN }}
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          action: "upload"
          app_location: "/"
          output_location: "dist"
