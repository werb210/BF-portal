name: Azure Static Web Apps CI/CD

on:
  push:
    branches:
      - main

jobs:
  api_contract_guards:
    runs-on: ubuntu-latest
    name: API Contract Guards
    steps:
      - uses: actions/checkout@v4
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Install dependencies
        run: npm ci
      - name: Lint
        run: npm run lint
      - name: Test
        run: npm run test
      - name: API guard checks
        run: npm run guard:api-contract

  build_and_deploy:
    runs-on: ubuntu-latest
    needs: api_contract_guards
    env:
      VITE_API_URL: http://test.local/api/v1

    name: Build and Deploy

    steps:
      - uses: actions/checkout@v4
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Build and Deploy
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN_WHITE_POND_0BA6ED30F }}
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          action: "upload"
          app_location: "/"
          api_location: ""
          output_location: "dist"
