name: silo-boundaries
on:
  pull_request:
    types: [opened, synchronize, reopened, labeled, unlabeled]

jobs:
  enforce:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with: { node-version: "20" }
      - run: npm ci --no-audit --no-fund
      - name: Resolve scope from PR label
        id: scope
        uses: actions/github-script@v7
        with:
          script: |
            const labels = (context.payload.pull_request?.labels ?? []).map((l) => l.name);
            const scoped = labels.find((l) => l.startsWith("scope:")) ?? "scope:fullstack";
            core.setOutput("label", scoped);
      - name: Enforce silo scope
        run: |
          git fetch origin main
          node scripts/enforce-silo-scope.mjs \
            --label="${{ steps.scope.outputs.label }}" \
            --base=origin/main
